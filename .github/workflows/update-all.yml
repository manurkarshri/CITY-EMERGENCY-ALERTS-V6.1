name: V6.1 Update All Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-all:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Collect Live Open-Meteo Weather
        run: node scripts/collect-weather.js
      - name: Collect Official IMD Pune Alerts
        run: node scripts/collect-alerts.js
      - name: Run Decision Intelligence Core
        run: node scripts/run-intelligence-core.js
      - name: Run Environmental Intelligence
        run: node scripts/build-environmental-intelligence.js
      - name: Run Journey Intelligence
        run: node scripts/build-journey-intelligence.js
      - name: Build Live Intelligence Readiness
        run: node scripts/build-live-intelligence.js
      - name: Generate Build Status
        run: node scripts/builders/build-status.js
      - name: Validate Generated Data
        run: node scripts/validation/validate-build.js
      - name: Commit Generated Intelligence
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update V6.1 production user testing intelligence"
          file_pattern: |
            data/*.json
      - name: Build current Pages artifact
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: node scripts/build-pages.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy current intelligence to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
